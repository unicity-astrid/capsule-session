[package]
name = "astrid-capsule-session"
version = "0.1.0"
description = "Persistent conversation session store"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "session"
file = "astrid_capsule_session.wasm"
type = "executable"

[exports]
"astrid:session" = "1.0.0"

[publish]
"session.v1.response.get_messages.*" = { wit = "get-messages-response" }
"session.v1.response.clear.*" = { wit = "clear-response" }

[subscribe]
"session.v1.append" = { wit = "TODO", handler = "handle_append" }
"session.v1.request.get_messages" = { wit = "TODO", handler = "handle_get_messages" }
"session.v1.request.clear" = { wit = "TODO", handler = "handle_clear" }
