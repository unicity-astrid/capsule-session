[package]
name = "astrid-capsule-session"
version = "0.1.0"
description = "Persistent conversation session store"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "session"
file = "astrid_capsule_session.wasm"
type = "executable"

# Append messages to conversation history
[[interceptor]]
event = "session.v1.append"
action = "handle_append"

# Serve conversation history on request
[[interceptor]]
event = "session.v1.request.get_messages"
action = "handle_get_messages"

# Clear session (create new chained session)
[[interceptor]]
event = "session.v1.request.clear"
action = "handle_clear"

[exports.astrid]
session = "1.0.0"

[capabilities]
ipc_publish = [
    "session.v1.response.get_messages.*",
    "session.v1.response.clear.*",
]
