[package]
name = "astrid-capsule-session"
version = "0.1.0"
description = "Persistent conversation session store"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "session"
file = "astrid_capsule_session.wasm"
type = "executable"

# Append messages to conversation history
[[interceptor]]
event = "session.v1.append"
action = "handle_append"

# Serve conversation history on request
[[interceptor]]
event = "session.v1.request.get_messages"
action = "handle_get_messages"

# Clear session (create new chained session)
[[interceptor]]
event = "session.v1.request.clear"
action = "handle_clear"

# Explicit provides required: ipc_publish uses wildcards for per-request
# scoped reply topics, but wildcard-derived provides have a different segment
# count than react's requires, breaking dependency resolution. If you add a
# new ipc_publish entry, add the corresponding provides entry too.
[dependencies]
provides = [
    "topic:session.v1.response.get_messages",
    "topic:session.v1.response.clear",
]

[capabilities]
ipc_publish = [
    "session.v1.response.get_messages.*",
    "session.v1.response.clear.*",
]
